<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy blue square background matching navbar -->
  <rect width="100" height="100" fill="#0a3e6e"/>
  
  <!-- Circular logo overlay centered -->
  <circle cx="50" cy="50" r="45" fill="#0a3e6e"/>
  <circle cx="50" cy="50" r="43" fill="#1a365d" stroke="#f97316" stroke-width="2"/>
  
  <!-- Simplified rocket icon -->
  <g transform="translate(50, 50)">
    <!-- Rocket body -->
    <path d="M-5,-25 L-5,10 L0,15 L5,10 L5,-25 L0,-30 Z" fill="#9ca853" stroke="#6b7844" stroke-width="1"/>
    
    <!-- Left fin -->
    <path d="M-5,5 L-12,12 L-12,5 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    
    <!-- Right fin -->
    <path d="M5,5 L12,12 L12,5 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    
    <!-- Center fin -->
    <path d="M-1,5 L0,12 L1,5 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    
    <!-- Flames -->
    <path d="M-3,15 L-2,20 L0,18 Z" fill="#fbbf24"/>
    <path d="M0,15 L0,22 L2,18 Z" fill="#f97316"/>
    <path d="M3,15 L2,20 L0,18 Z" fill="#fbbf24"/>
  </g>
</svg>
