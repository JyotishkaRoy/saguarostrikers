<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy blue square background matching navbar -->
  <rect width="100" height="100" fill="#0a3e6e"/>
  
  <!-- Orange circular border (matching logo design) -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#f97316" stroke-width="3"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#d97706" stroke-width="1"/>
  
  <!-- Inner dark circle -->
  <circle cx="50" cy="50" r="40" fill="#1a365d"/>
  
  <!-- Simplified rocket/saguaro design -->
  <g transform="translate(50, 50)">
    <!-- Main body (greenish like the saguaro) -->
    <ellipse cx="0" cy="-5" rx="6" ry="28" fill="#8b9a5b" stroke="#6b7844" stroke-width="1"/>
    
    <!-- Left arm -->
    <ellipse cx="-9" cy="0" rx="3" ry="12" fill="#9ca853" stroke="#6b7844" stroke-width="0.5"/>
    
    <!-- Right arm -->
    <ellipse cx="9" cy="0" rx="3" ry="12" fill="#9ca853" stroke="#6b7844" stroke-width="0.5"/>
    
    <!-- Center rocket fins (orange) -->
    <path d="M-7,10 L-10,18 L-7,15 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    <path d="M7,10 L10,18 L7,15 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    <path d="M-2,10 L0,18 L2,10 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
    
    <!-- Flames at bottom -->
    <ellipse cx="-3" cy="24" rx="2" ry="4" fill="#fbbf24" opacity="0.8"/>
    <ellipse cx="0" cy="26" rx="2.5" ry="5" fill="#f97316" opacity="0.8"/>
    <ellipse cx="3" cy="24" rx="2" ry="4" fill="#fbbf24" opacity="0.8"/>
    
    <!-- Top detail (window/nose cone) -->
    <circle cx="0" cy="-20" r="3" fill="#ea580c"/>
    <circle cx="0" cy="-20" r="1.5" fill="#1a365d"/>
  </g>
  
  <!-- Small stars in background -->
  <circle cx="20" cy="20" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="80" cy="25" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="25" cy="75" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="75" cy="70" r="0.8" fill="white" opacity="0.6"/>
</svg>
